<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Black rounded background -->
  <rect width="64" height="64" rx="14" fill="#111111"/>

  <!-- White donut outer ring -->
  <circle cx="32" cy="32" r="24" fill="white"/>

  <!-- Black inner hole -->
  <circle cx="32" cy="32" r="10.5" fill="#111111"/>

  <!-- Sprinkle accents on the donut -->
  <rect x="30" y="9.5" width="4" height="2" rx="1" fill="#111111" opacity="0.25"/>
  <rect x="30" y="9.5" width="4" height="2" rx="1" fill="#111111" opacity="0.25" transform="rotate(45 32 32)"/>
  <rect x="30" y="9.5" width="4" height="2" rx="1" fill="#111111" opacity="0.25" transform="rotate(90 32 32)"/>
  <rect x="30" y="9.5" width="4" height="2" rx="1" fill="#111111" opacity="0.25" transform="rotate(135 32 32)"/>
  <rect x="30" y="9.5" width="4" height="2" rx="1" fill="#111111" opacity="0.25" transform="rotate(180 32 32)"/>
  <rect x="30" y="9.5" width="4" height="2" rx="1" fill="#111111" opacity="0.25" transform="rotate(225 32 32)"/>
  <rect x="30" y="9.5" width="4" height="2" rx="1" fill="#111111" opacity="0.25" transform="rotate(270 32 32)"/>
  <rect x="30" y="9.5" width="4" height="2" rx="1" fill="#111111" opacity="0.25" transform="rotate(315 32 32)"/>
</svg>
